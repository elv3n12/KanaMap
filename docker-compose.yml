services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /app/uploads
    volumes:
      - web_uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.kanamap.rule=Host(`kanamap.srv1339684.hstgr.cloud`)"
      - "traefik.http.routers.kanamap.tls=true"
      - "traefik.http.routers.kanamap.entrypoints=web,websecure"
      - "traefik.http.routers.kanamap.tls.certresolver=mytlschallenge"
      - "traefik.http.services.kanamap.loadbalancer.server.port=3000"
    networks:
      - n8n_default
      - default
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - default

networks:
  n8n_default:
    external: true
  default:

volumes:
  mysql_data:
  web_uploads:
