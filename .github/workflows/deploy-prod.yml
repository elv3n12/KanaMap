name: Deploy Production

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.VPS_SSH_KEY != '' && secrets.VPS_APP_DIR != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            if [ ! -f docker-compose.prod.yml ]; then
              echo "docker-compose.prod.yml not found in ${{ secrets.VPS_APP_DIR }}"
              exit 1
            fi

            # Keep repo in sync when compose files/env templates evolve.
            if [ -d .git ]; then
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
            fi

            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d web
            docker compose -f docker-compose.prod.yml ps
