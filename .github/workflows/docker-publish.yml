name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HOSTINGER_API_BASE: https://developers.hostinger.com
  HOSTINGER_VM_ID: "1339684"
  HOSTINGER_PROJECT: kanamap

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MAPTILER_KEY=${{ secrets.NEXT_PUBLIC_MAPTILER_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Hostinger deploy
        env:
          TOKEN_FROM_SECRET: ${{ secrets.HOSTINGER_API_TOKEN }}
          TOKEN_FROM_VAR: ${{ vars.HOSTINGER_API_TOKEN }}
        run: |
          set -euo pipefail
          HOSTINGER_API_TOKEN="${TOKEN_FROM_SECRET:-${TOKEN_FROM_VAR:-}}"
          if [ -z "${HOSTINGER_API_TOKEN}" ]; then
            echo "::error::HOSTINGER_API_TOKEN is empty."
            echo "Add it as a Repository *secret* (not a variable):"
            echo "  Settings → Secrets and variables → Actions → Repository secrets → New"
            echo "  Name: HOSTINGER_API_TOKEN"
            echo "See docs/DEPLOY_PRODUCTION.md"
            exit 1
          fi
          export HOSTINGER_API_TOKEN
          UPDATE_URL="${HOSTINGER_API_BASE}/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker/${HOSTINGER_PROJECT}/update"
          echo "Triggering deploy: $UPDATE_URL"
          HTTP_CODE=$(curl -sS -o /tmp/hostinger-update.json -w "%{http_code}" -X POST "$UPDATE_URL" \
            -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
            -H "Accept: application/json")
          cat /tmp/hostinger-update.json || true
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Hostinger update failed (HTTP $HTTP_CODE). Check API token permissions."
            exit 1
          fi
          echo "Deploy triggered for commit ${GITHUB_SHA}"

      - name: Wait for containers
        run: sleep 90

      - name: Verify web container is running
        env:
          TOKEN_FROM_SECRET: ${{ secrets.HOSTINGER_API_TOKEN }}
          TOKEN_FROM_VAR: ${{ vars.HOSTINGER_API_TOKEN }}
        run: |
          set -euo pipefail
          HOSTINGER_API_TOKEN="${TOKEN_FROM_SECRET:-${TOKEN_FROM_VAR:-}}"
          CONTAINERS_URL="${HOSTINGER_API_BASE}/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker/${HOSTINGER_PROJECT}/containers"
          for attempt in 1 2 3; do
            BODY=$(curl -fsS "$CONTAINERS_URL" \
              -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
              -H "Accept: application/json")
            echo "$BODY" | jq '.[] | {name, status, state, image}'
            if echo "$BODY" | jq -e '.[] | select(.name == "kanamap-web-1") | .state == "running"' > /dev/null; then
              echo "kanamap-web-1 is running"
              exit 0
            fi
            echo "Web container not ready yet (attempt $attempt/3), waiting 30s..."
            sleep 30
          done
          echo "::error::kanamap-web-1 did not reach running state"
          exit 1
