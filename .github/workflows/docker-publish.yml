name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HOSTINGER_API_BASE: https://developers.hostinger.com
  HOSTINGER_VM_ID: "1339684"
  HOSTINGER_PROJECT: kanamap
  VPS_HOST: 217.65.144.105
  VPS_USER: root
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Set image tag output
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MAPTILER_KEY=${{ secrets.NEXT_PUBLIC_MAPTILER_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if SSH prune is configured
        id: ssh-check
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VPS_SSH_PRIVATE_KEY not set. Deploy continues, prune skipped."
            exit 0
          fi

          if ! printf '%s' "$SSH_KEY" | grep -Eq "BEGIN (OPENSSH|RSA|EC|PRIVATE)"; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VPS_SSH_PRIVATE_KEY does not look like a private key."
            echo "::warning::If you pasted a Hostinger managed public key, use the matching private key instead."
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Pre-deploy prune + set image tag (via SSH)
        id: pre-prune
        if: steps.ssh-check.outputs.available == 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.VPS_SSH_HOST != '' && vars.VPS_SSH_HOST || env.VPS_HOST }}
          username: ${{ vars.VPS_SSH_USER != '' && vars.VPS_SSH_USER || env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            echo "=== Pre-deploy: prune old KanaMap images ==="
            IMAGE_REPO="ghcr.io/elv3n12/kanamap"

            USED_IDS=$(docker ps -a --filter "name=kanamap" --format '{{.Image}}' | \
              xargs -r -I{} docker inspect --format '{{.Id}}' {} 2>/dev/null | sort -u || true)

            for IMG_ID in $(docker images "$IMAGE_REPO" --format '{{.ID}}' | sort -u); do
              if echo "$USED_IDS" | grep -q "$IMG_ID"; then
                echo "Keeping $IMG_ID (in use)"
              else
                echo "Removing $IMG_ID"
                docker rmi -f "$IMG_ID" 2>/dev/null || true
              fi
            done

            echo "=== Setting KANAMAP_IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }} ==="
            ENV_FILE="/docker/kanamap/.env"
            if [ -f "$ENV_FILE" ]; then
              sed -i '/^KANAMAP_IMAGE_TAG=/d' "$ENV_FILE"
            fi
            echo "KANAMAP_IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" >> "$ENV_FILE"

            echo "=== Pre-deploy complete ==="

      - name: Warn if SSH prune failed
        if: steps.ssh-check.outputs.available == 'true' && steps.pre-prune.outcome == 'failure'
        run: |
          echo "::warning::SSH prune step failed."
          echo "::warning::Deploy will continue, but old images may remain on VPS."
          echo "::warning::Check VPS_SSH_PRIVATE_KEY / VPS_SSH_PASSPHRASE / VPS_SSH_HOST / VPS_SSH_USER."

      - name: Trigger Hostinger deploy
        env:
          TOKEN_FROM_SECRET: ${{ secrets.HOSTINGER_API_TOKEN }}
          TOKEN_FROM_VAR: ${{ vars.HOSTINGER_API_TOKEN }}
        run: |
          set -euo pipefail
          HOSTINGER_API_TOKEN="${TOKEN_FROM_SECRET:-${TOKEN_FROM_VAR:-}}"
          if [ -z "${HOSTINGER_API_TOKEN}" ]; then
            echo "::error::HOSTINGER_API_TOKEN is empty."
            echo "Add it as a Repository secret named HOSTINGER_API_TOKEN."
            exit 1
          fi

          UPDATE_URL="${HOSTINGER_API_BASE}/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker/${HOSTINGER_PROJECT}/update"
          echo "Triggering deploy: $UPDATE_URL"
          HTTP_CODE=$(curl -sS -o /tmp/hostinger-update.json -w "%{http_code}" -X POST "$UPDATE_URL" \
            -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
            -H "Accept: application/json")
          cat /tmp/hostinger-update.json || true
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Hostinger update failed (HTTP $HTTP_CODE)."
            exit 1
          fi

      - name: Wait for containers
        run: sleep 90

      - name: Verify web container is running
        env:
          TOKEN_FROM_SECRET: ${{ secrets.HOSTINGER_API_TOKEN }}
          TOKEN_FROM_VAR: ${{ vars.HOSTINGER_API_TOKEN }}
        run: |
          set -euo pipefail
          HOSTINGER_API_TOKEN="${TOKEN_FROM_SECRET:-${TOKEN_FROM_VAR:-}}"
          CONTAINERS_URL="${HOSTINGER_API_BASE}/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker/${HOSTINGER_PROJECT}/containers"
          for attempt in 1 2 3; do
            BODY=$(curl -fsS "$CONTAINERS_URL" \
              -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
              -H "Accept: application/json")
            echo "$BODY" | jq '.[] | {name, status, state, image}'
            if echo "$BODY" | jq -e '.[] | select(.name == "kanamap-web-1") | .state == "running"' > /dev/null; then
              echo "kanamap-web-1 is running"
              exit 0
            fi
            echo "Web container not ready yet (attempt $attempt/3), waiting 30s..."
            sleep 30
          done
          echo "::error::kanamap-web-1 did not reach running state"
          exit 1

      - name: Post-deploy prune dangling images (via SSH)
        id: post-prune
        if: steps.ssh-check.outputs.available == 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.VPS_SSH_HOST != '' && vars.VPS_SSH_HOST || env.VPS_HOST }}
          username: ${{ vars.VPS_SSH_USER != '' && vars.VPS_SSH_USER || env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            echo "=== Post-deploy: prune dangling images ==="
            docker image prune -f
            echo "=== Disk usage ==="
            docker system df

      - name: Warn if post-deploy prune failed
        if: steps.ssh-check.outputs.available == 'true' && steps.post-prune.outcome == 'failure'
        run: |
          echo "::warning::Post-deploy SSH prune failed."
          echo "::warning::Deployment is complete, but dangling images may remain."
